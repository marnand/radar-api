services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://radar:radar@db:5432/radar_ikasa
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - radar_network
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar
      POSTGRES_DB: radar_ikasa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar -d radar_ikasa"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - radar_network

volumes:
  postgres_data:

networks:
  radar_network:
    driver: bridge
    name: radar_network
